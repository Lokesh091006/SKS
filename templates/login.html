<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login with OTP</h2>

<form method="POST" action="/send-otp">
    
    <input type="text"
           name="mobile"
           placeholder="Enter 10 digit mobile number"
           pattern="[0-9]{10}"
           required>

    <button type="submit">Send OTP</button>
</form>

</body>
</html>
