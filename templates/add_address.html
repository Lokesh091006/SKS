<!DOCTYPE html>
<html>
<head>
    <title>Add New Address - Mall SKS</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .address-container {
            max-width: 500px;
            margin: 80px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row input {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #ff3f6c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover {
            background: #e6325a;
        }

        @media (max-width: 600px) {
            .address-container {
                margin: 20px;
            }
            .row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

{% include "header.html" %}

<div class="address-container">

    <h2>➕ Add New Address</h2>

    <form method="post">

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="text" name="mobile" placeholder="10 Digit Mobile Number"
               pattern="[0-9]{10}" required>

        <input type="email" name="email" placeholder="Email" required>

        <textarea name="house" placeholder="House No, Building, Street"
                  rows="2" required></textarea>

        <textarea name="street" placeholder="Area, Locality"
                  rows="2" required></textarea>

        <div class="row">
            <input type="text" name="city" id="city" placeholder="City" required>
            <input type="text" name="state" id="state" placeholder="State" required>
        </div>

        <input type="text" name="pincode" id="pincode"
       placeholder="Pincode"
       maxlength="6"
       inputmode="numeric"
       pattern="[0-9]{6}" required>

<small id="pinMsg" style="display:block;margin-top:-10px;margin-bottom:10px;"></small>

        <button type="submit">
            Save Address →
        </button>

    </form>

</div>



<script>
const pin = document.getElementById("pincode");
const city = document.getElementById("city");
const state = document.getElementById("state");
const msg = document.getElementById("pinMsg");

let timer = null;

let lastPin = "";

pin.addEventListener("input", () => {
  // only digits & max 6
  pin.value = pin.value.replace(/\D/g, "").slice(0, 6);

  // reset
  msg.textContent = "";
  msg.style.color = "";
  
  // city/state clear only when typing incomplete pin
  if (pin.value.length < 6) {
    return;
  }

  if (pin.value === lastPin) return;  // same pin malli call cheyyakunda
lastPin = pin.value;

  clearTimeout(timer);
  timer = setTimeout(async () => {
    msg.textContent = "Checking pincode...";
    msg.style.color = "#555";

    try {
      const res = await fetch(`/api/pincode/${pin.value}`);
      const data = await res.json();

      if (!data.ok) {
        city.value = "";
        state.value = "";
        msg.textContent = data.error || "Invalid pincode";
        msg.style.color = "red";
        return;
      }

      city.value = data.city || "";
      state.value = data.state || "";
      msg.textContent = "✅ Pincode verified";
      msg.style.color = "green";
    } catch (e) {
      msg.textContent = "Pincode service error";
      msg.style.color = "red";
    }
  }, 300);
});
</script>

</body>
</html>
